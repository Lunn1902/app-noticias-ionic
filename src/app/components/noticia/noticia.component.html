<ion-card>
  <ion-card-header>
    <ion-card-subtitle color="primary">{{ noticia.source.name }}</ion-card-subtitle>
    <ion-card-title color="dark" (click)="openNews()">{{ noticia.title }}</ion-card-title>
  </ion-card-header>

  <ion-img *ngIf="noticia.urlToImage" (click)="openNews()" [src]="noticia.urlToImage"></ion-img>

  <ion-card-content>
    <ion-text color="dark">{{ noticia.description }}</ion-text>
    <ion-row>
      <ion-col size="9">
        <h6>{{ noticia.publishedAt | date: 'dd/MM/yy HH:mm' }}</h6>
      </ion-col>
      <ion-col size="3" class="ion-text-right">
        <ion-icon name="ellipsis-horizontal" color="primary" (click)="openMenu()"></ion-icon>
      </ion-col>
    </ion-row>
  </ion-card-content>
</ion-card>
