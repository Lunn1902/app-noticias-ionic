<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="titulo-destacado">Inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="recargar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <app-noticias [noticias]="noticias"></app-noticias>

  <ion-infinite-scroll (ionInfinite)="cargarMas($event)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Cargando más noticias..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
