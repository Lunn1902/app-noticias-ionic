<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title class="titulo-destacado">Categorías</ion-title>
  </ion-toolbar>

  <ion-segment [value]="categoriaSeleccionada" (ionChange)="segmentChanged($event)" scrollable>

    <ion-segment-button *ngFor="let categoria of categorias" [value]="categoria">
      <ion-label>{{ categoria | titlecase }}</ion-label>
    </ion-segment-button>

  </ion-segment>
</ion-header>

<ion-content [fullscreen]="true">
  <app-noticias [noticias]="noticias"></app-noticias>
</ion-content>
